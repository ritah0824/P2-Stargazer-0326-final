packages:
  "framer-motion": "For fluid layout animations, staggering panels, and premium page transitions"
  "date-fns": "For formatting astronomical dates, times, and calculating relative times"
  "lucide-react": "For astronomical and UI icons"
  "clsx": "For conditional class merging"
  "tailwind-merge": "For class merging in custom UI components"

images:
  - path: "artifacts/stargazer/public/images/starmap-bg.png"
    description: "Breathtaking deep space nebula with millions of stars, dark purples, vibrant cyans, and deep midnight blues, realistic astronomical style, highly detailed, empty center"
    aspect_ratio: "16:9"

notes:
  - "The app uses React Query hooks generated by Orval from @workspace/api-client-react"
  - "All data is auto-refreshed every 60 seconds (refetchInterval: 60000)"
  - "Default location is set to New York coordinates, with a custom location picker provided"
